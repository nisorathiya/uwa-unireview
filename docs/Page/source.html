<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>UWA Unit Reviews</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f9fafb;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        /* LEFT */
        .left {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #f3f4f6;
        }

        .left h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .left p {
            color: #555;
            margin-bottom: 30px;
        }

        .feature {
            margin-bottom: 10px;
        }

        .image {
            margin-top: 40px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
        }

        .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* RIGHT */
        .right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tab {
            cursor: pointer;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            color: #666;
        }

        .tab.active {
            border-color: #2563eb;
            color: #2563eb;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .secondary {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .secondary span {
            color: #2563eb;
            cursor: pointer;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #aaa;
        }

        .google-btn {
            background: white;
            border: 1px solid #ccc;
            color: black;
        }

        .google-btn:hover {
            background: #f3f4f6;
        }

        .hidden {
            display: none;
        }

        .trust {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .left {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container" style="background-color: #26282e;">

        <!-- LEFT -->
        <div class="left" style="background-image: url('https://www.assethub.uwa.edu.au/api/public/content/9e1796e52c1247739fbba90a2c51b771?v=d9afcfb7'); background-size: cover; background-position: center; opacity: 70%;" >
            <h1>Real reviews from UWA students</h1>
            <p style="color: #2563eb;"">Verified. Anonymous. Helpful.</p>

            <div class="feature">✅ Only UWA emails allowed</div>
            <div class="feature">⭐ 4,000+ unit reviews</div>
            <div class="feature">🎓 Used by thousands of students</div>

            <div class="image">
                
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div class="card">

                <!-- Tabs -->
                <div class="tabs">
                    <div id="loginTab" class="tab">Log in</div>
                    <div id="signupTab" class="tab active">Sign up</div>
                </div>

                <!-- SIGNUP -->
                <div id="signupForm">
                    <h2>Create account</h2>
                    <input id="name" type="text" placeholder="Full name" />
                    <input id="email" type="email" placeholder="UWA student email" />
                    <input id="password" type="password" placeholder="Password" />
                    <button onclick="submitForm('signup')">Sign up</button>

                    <div class="secondary">
                        Already have an account?
                        <span onclick="switchMode('login')">Log in</span>
                    </div>
                </div>

                <!-- LOGIN -->
                <div id="loginForm" class="hidden">
                    <h2>Welcome back</h2>
                    <input id="loginEmail" type="email" placeholder="UWA student email" />
                    <input id="loginPassword" type="password" placeholder="Password" />
                    <button onclick="submitForm('login')">Log in</button>

                    <div class="secondary">
                        Don’t have an account?
                        <span onclick="switchMode('signup')">Sign up</span>
                    </div>
                </div>

                <div class="divider">or</div>

                <button class="google-btn">Continue with Google</button>

                <div class="trust">
                    Your identity is never shown with reviews.
                </div>

            </div>
        </div>
    </div>

    <script>
        const loginTab = document.getElementById("loginTab");
        const signupTab = document.getElementById("signupTab");
        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");

        function switchMode(mode) {
            if (mode === "login") {
                loginForm.classList.remove("hidden");
                signupForm.classList.add("hidden");

                loginTab.classList.add("active");
                signupTab.classList.remove("active");
            } else {
                signupForm.classList.remove("hidden");
                loginForm.classList.add("hidden");

                signupTab.classList.add("active");
                loginTab.classList.remove("active");
            }
        }

        loginTab.onclick = () => switchMode("login");
        signupTab.onclick = () => switchMode("signup");

        function submitForm(mode) {
            let email =
                mode === "signup"
                    ? document.getElementById("email").value
                    : document.getElementById("loginEmail").value;

            if (!email.endsWith("@student.uwa.edu.au")) {
                alert("Please use your UWA student email.");
                return;
            }

            alert(mode === "signup" ? "Signing up..." : "Logging in...");
        }
    </script>

</body>

</html>
